<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luciana & Junteng</title>
    <meta
      name="description"
      content="Luciana & Junteng 的旅行日记。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260427-final-clean-v8" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Luciana & Junteng</p>
          <h1 id="site-title">加载中…</h1>
        </div>
        <div class="hero-card">
          <div class="hero-portrait-wrap">
            <img class="hero-portrait" src="./couple-portrait.png" alt="Luciana & Junteng portrait" />
          </div>
          <div class="stat-grid" id="hero-stats"></div>
        </div>
      </header>

      <main>
        <section class="section-card planner-card">
          <div class="section-heading">
            <p class="eyebrow">Step 1</p>
            <h2>世界旅行地图</h2>
          </div>
          <form id="planner-form" class="planner-form">
            <label class="planner-field">
              <span>洲别</span>
              <select id="planner-continent" name="continent">
                <option value="亚洲">亚洲</option>
                <option value="欧洲">欧洲</option>
                <option value="非洲">非洲</option>
                <option value="美洲">美洲</option>
                <option value="大洋洲">大洋洲</option>
              </select>
            </label>
            <label class="planner-field">
              <span>加入到</span>
              <select id="planner-lane" name="lane">
                <option value="wishlist">心愿单</option>
                <option value="visited">已经去过</option>
              </select>
            </label>
            <label class="planner-field">
              <span>国家</span>
              <input id="planner-country" name="country" type="text" placeholder="例如：冰岛" required />
            </label>
            <label class="planner-field planner-field-wide">
              <span>目的地 / 备注</span>
              <input id="planner-destination" name="destination" type="text" placeholder="例如：雷克雅未克 / 蓝湖 / 极光" />
            </label>
            <button class="planner-submit" type="submit">+ 新增目的地</button>
          </form>
          <div class="planner-savebar">
            <label class="planner-field planner-token-field">
              <span>GitHub Token（fine-grained，仅此仓库）</span>
              <input id="github-token" type="password" placeholder="粘贴 fine-grained token 后点击保存到 GitHub" />
            </label>
            <button id="save-github" class="planner-save-btn" type="button">保存到 GitHub</button>
          </div>
          <div id="planner-save-status" class="planner-save-status"></div>
          <div id="planner-board" class="planner-board"></div>
        </section>

        <section class="section-card accent-card">
          <div class="section-heading">
            <p class="eyebrow">Step 2</p>
            <h2>已经一起去过的地方</h2>
          </div>
          <div id="visited-country-years" class="year-pill-grid"></div>
        </section>

        <section class="section-card timeline-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Step 3</p>
              <h2>2029—2034 旅行日记时间轴</h2>
            </div>
            <button id="filmroll-btn" class="filmroll-btn">🎞 冲洗胶卷</button>
          </div>
          <div id="future-country-years" class="year-pill-grid soft"></div>
          <div id="timeline" class="timeline"></div>
        </section>
      </main>
    </div>

    <template id="timeline-template">
      <article class="timeline-entry">
        <div class="timeline-marker">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-content">
          <div class="entry-topline">
            <span class="entry-date"></span>
            <span class="entry-country"></span>
          </div>
          <h3 class="entry-title"></h3>
          <p class="entry-destination"></p>
          <p class="entry-diary"></p>
          <div class="frame-grid"></div>
        </div>
      </article>
    </template>

    <template id="frame-template">
      <div class="photo-frame">
        <div class="frame-inner">
          <span class="frame-badge">PHOTO</span>
          <p class="frame-copy"></p>
        </div>
      </div>
    </template>

    <script src="app.js?v=20260427-final-clean-v8" defer></script>
  </body>
</html>
