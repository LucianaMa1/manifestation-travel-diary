<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luciana & Junteng</title>
    <meta
      name="description"
      content="Luciana & Junteng 的旅行网站：已去过与想去的国家、年份时间轴、目的地分析和照片占位相框。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Luciana & Junteng</p>
          <h1 id="site-title">加载中…</h1>
          <p id="site-subtitle" class="hero-subtitle"></p>
          <div class="hero-tags">
            <span>旅行时间轴</span>
            <span>国家清单</span>
            <span>照片相框预留</span>
          </div>
        </div>
        <div class="hero-card">
          <div class="hero-portrait-wrap">
            <img class="hero-portrait" src="./couple-portrait.png" alt="Luciana & Junteng portrait" />
          </div>
          <p class="mini-label">本站说明</p>
          <p id="hero-note"></p>
          <div class="stat-grid" id="hero-stats"></div>
        </div>
      </header>

      <main>
        <section class="section-card">
          <div class="section-heading">
            <p class="eyebrow">Step 1</p>
            <h2>愿望清单拆解：国家与目的地</h2>
          </div>
          <div class="analysis-layout">
            <div>
              <p class="section-intro" id="analysis-source"></p>
              <ul id="analysis-summary" class="summary-list"></ul>
            </div>
            <div>
              <p class="mini-label">清单涉及的国家 / 地区</p>
              <div id="country-tags" class="country-tags"></div>
            </div>
          </div>
        </section>

        <section class="section-card accent-card">
          <div class="section-heading">
            <p class="eyebrow">Step 2</p>
            <h2>已经一起去过的地方</h2>
          </div>
          <p class="section-intro">
            这些是你后来补充确认过、已经真实发生的旅行足迹。先把走过的地方整理清楚，再把之后想去的地方慢慢写进时间里。
          </p>
          <div id="visited-country-years" class="year-pill-grid"></div>
          <div id="completed-grid" class="completed-grid"></div>
        </section>

        <section class="section-card timeline-card">
          <div class="section-heading">
            <p class="eyebrow">Step 3</p>
            <h2>2029—2034 旅行日记时间轴</h2>
          </div>
          <p class="section-intro">
            这部分按年份顺序写成未来旅行日记。每个目的地都预留了相框位置，当前先用小字描述填充，后面可以逐站换成真实照片。
          </p>
          <div id="future-country-years" class="year-pill-grid soft"></div>
          <div id="timeline" class="timeline"></div>
        </section>
      </main>
    </div>

    <template id="completed-template">
      <article class="completed-item">
        <p class="completed-country"></p>
        <h3 class="completed-destination"></h3>
        <p class="completed-note"></p>
      </article>
    </template>

    <template id="timeline-template">
      <article class="timeline-entry">
        <div class="timeline-marker">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-content">
          <div class="entry-topline">
            <span class="entry-date"></span>
            <span class="entry-country"></span>
          </div>
          <h3 class="entry-title"></h3>
          <p class="entry-destination"></p>
          <p class="entry-wish"></p>
          <p class="entry-diary"></p>
          <div class="frame-grid"></div>
        </div>
      </article>
    </template>

    <template id="frame-template">
      <div class="photo-frame">
        <div class="frame-inner">
          <span class="frame-badge">PHOTO</span>
          <p class="frame-copy"></p>
        </div>
      </div>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
